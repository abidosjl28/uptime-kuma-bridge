version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - KUMA_DB_URL=${KUMA_DB_URL}
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data  # Changed from :ro to allow writes
    environment:
      - PORT=3003
      - DB_PATH=/app/data/kuma.db
      - NODE_ENV=${NODE_ENV:-production}
      - UPTIME_KUMA_API=${UPTIME_KUMA_API:-https://uptime.davisa.store/api}
      - UPTIME_KUMA_USERNAME=${UPTIME_KUMA_USERNAME}
      - UPTIME_KUMA_PASSWORD=${UPTIME_KUMA_PASSWORD}
    labels:
      - coolify.managed=true

volumes:
  uptime-kuma-data:
    external: true
