version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data:ro
    environment:
      - PORT=3003
      - DB_PATH=/app/data/kuma.db
      - NODE_ENV=${NODE_ENV:-production}
    labels:
      - coolify.managed=true
