version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - KUMA_DB_URL=${KUMA_DB_URL}
    restart: unless-stopped
    environment:
      - PORT=3003
      - DB_PATH=/app/data/kuma.db
      - NODE_ENV=${NODE_ENV:-production}
    labels:
      - coolify.managed=true
