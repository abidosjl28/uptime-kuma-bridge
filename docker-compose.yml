version: '3.8'

services:
  uptime-kuma-bridge:
    image: node:22-alpine
    container_name: uptime-kuma-bridge
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./server.js:/app/server.js
      - uptime-kuma-data:/app/data:ro
      - ./package.json:/app/package.json:ro
    environment:
      - PORT=3003
      - DB_PATH=/app/data/kuma.db
      - NODE_ENV=production
    ports:
      - "3003:3003"
    network_mode: host
    healthcheck:
      test: 
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:3003/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  uptime-kuma-data:
    external: true
